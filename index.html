<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html{
    scroll-behavior:smooth;
}

body{
    background:#080b1c;
    color:white;
    overflow-x:hidden;
}


/* NAVBAR */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:100;
    padding:20px 8%;
    background:rgba(8,11,28,.6);
    backdrop-filter:blur(15px);
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}


.logo{
    font-size:25px;
    font-weight:800;
    color:#fff;
}

.logo span{
    color:#7c5cff;
}


.nav-menu{
    display:flex;
    gap:35px;
    list-style:none;
}

.nav-menu a{
    text-decoration:none;
    color:#ddd;
    font-size:15px;
}

.nav-menu a:hover{
    color:#7c5cff;
}


/* HERO */

.hero{

    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:120px 20px 50px;

    background:
    radial-gradient(circle at top left,#5b3cff55,transparent 35%),
    radial-gradient(circle at bottom right,#00c6ff33,transparent 35%);

}


.hero-content{
    max-width:900px;
}


.badge{

    display:inline-block;
    padding:8px 18px;
    border-radius:30px;
    background:#ffffff12;
    border:1px solid #ffffff22;
    margin-bottom:25px;
    color:#ddd;
    font-size:14px;

}


.hero h1{

    font-size:60px;
    line-height:1.1;
    font-weight:800;
    margin-bottom:25px;

}


.hero h1 span{

    background:linear-gradient(90deg,#7c5cff,#00d4ff);
    -webkit-background-clip:text;
    color:transparent;

}



.hero p{

    max-width:650px;
    margin:auto;
    color:#b8b8c7;
    font-size:18px;
    line-height:1.7;

}



.buttons{

    margin-top:35px;
    display:flex;
    justify-content:center;
    gap:20px;
}


.btn{

    padding:15px 35px;
    border-radius:50px;
    text-decoration:none;
    font-weight:600;
    transition:.3s;

}


.btn-primary{

    background:linear-gradient(90deg,#7c5cff,#00c6ff);
    color:white;

}


.btn-secondary{

    border:1px solid #ffffff33;
    color:white;

}



.btn:hover{

    transform:translateY(-5px);

}



/* VIDEO BOX */


.video-box{

    margin:60px auto 0;
    width:750px;
    max-width:90%;
    height:400px;

    border-radius:25px;

    background:
    linear-gradient(135deg,#ffffff15,#ffffff05);

    border:1px solid #ffffff20;

    display:flex;
    align-items:center;
    justify-content:center;

    box-shadow:0 20px 70px #0008;

}


.play{

    width:90px;
    height:90px;
    border-radius:50%;

    background:white;
    color:#7c5cff;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:35px;

}
.video-box{
    margin:60px auto 0;
    width:750px;
    max-width:90%;
    height:400px;

    border-radius:25px;
    overflow:hidden;

    background:#ffffff12;
    border:1px solid #ffffff20;

    box-shadow:0 20px 70px #0008;
}


.video-box video{

    width:100%;
    height:100%;

    object-fit:cover;

    display:block;

}

@media(max-width:768px){

.hero h1{
    font-size:40px;
}

.nav-menu{
    display:none;
}

.video-box{
    height:250px;
}


.buttons{
    flex-direction:column;
}

}


</style>
